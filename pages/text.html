<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }
        div{
            backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div style="width: 100%;height: 50px;background-color: red;">
        <div style="width:80%;height: 100%;height: 50px; margin: 0 auto;background-color: aqua;"></div>
    </div>
    <div style="width: 80%;height: 800px;margin: 0 auto;background-color: blue;"></div>
    <script>
        alert("1");
        async function async1(){
            alert("2")
            await async2();
           alert("3")
        }
        async function async2(){
           alert("4");
        }
        setTimeout(function(){
            alert('6')
            new Promise(function(resolve){
                alert('8')
                resolve();
            }).then(function(){
                alert('9')
            })
        })
        async1();
        new Promise(function(resolve){
            alert('10')
            resolve();
        }).then(function(){
            alert('11');
        });
        alert('12')
    </script>
</body>
</html>
