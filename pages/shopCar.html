<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>购物车</title>
    <link rel="stylesheet" href="../css/shopCar.css">
    <link rel="stylesheet" href="../css/reset.css">
</head>
<body>
     <!-- ====================================================== navTop -->
     <div id="navTop">
        <div class="container">
            <div class="navTop_logo"></div>
            <div class="navTop">
                <a href="./allGoods.html" class="navTop_goods">全部商品</a>
                <a class="navTop_goods">华为</a>
                <a href="./allGoods.html" class="navTop_goods">小米</a>
                <a href="./allGoods.html" class="navTop_goods">苹果</a>
                <a href="./allGoods.html" class="navTop_goods">OPPO</a>
                <a href="./allGoods.html" class="navTop_goods">戴尔</a>
                <a href="./allGoods.html" class="navTop_goods">vivo</a>
            </div>
            <b class="userName">用户名</b>
            <sapn id="balance">余额: ￥</sapn>
            <b class="balance">0.00</b>
            <span class="recharge ">充值</span>
        </div>
    </div>
    <div id="banner">
        <div class="container">
            <div class="banner_top">
                <a href="../index.html">首页</a>
                <span>/</span>
                <a href="">购物车</a>
                <div class="buyProcess">
                    <div class="process1">
                        <span >购物车</span>
                        <span class="pocess_line">————</span>
                    </div>
                    <div class="process2">
                        <span>订单确认</span>
                        <span class="pocess_line">————</span>
                    </div>
                    <div class="process3">
                        <span>完成订单</span>  
                    </div>
                </div>
                <a href="./index.html" class="continueShopping">继续购物 ></a>
            </div>
            <div id="buy">
                <div class="container">
                    <span class="checkAll"></span>
                    <span>全选</span>
                    <span class="delAll">删除</span>
                    <div class="buy_goods">
                        <span>共</span>
                        <span class="buy_goodsNum">1</span>
                        <span>件商品</span>
                    </div>
                    <span id="buyBalance">合计：</span>
                    <span class="buy_balance ">￥0.00</span>
                    <span class="buyAll">结算</span>
                </div>
                
            </div>
            <div class="banner_wrap">
                <table>
                    <tr>
                        <td>商品</td>
                        <td>单价</td>
                        <td>数量</td>
                        <td>小计</td>
                        <td>操作</td>
                    </tr>
                    <tbody id="myTbody">
                        <tr class="row">
                            <td class="Name">
                                <span class="chooses"></span>
                                <a href="" class="Name_goods">
                                    <img src="../img/cart01.jpg" alt="">
                                    <span class="goodsName">商品名称</span>
                                    <span class="goodsDescribe">商品款式</span>
                                    <span></span>
                                </a>
                                
                            </td>
                            <td class="Price">
                                <span class="goodsPrice">￥20.00</span>
                            </td>
                            <td class="Num">
                                <span class="numLeft">-</span>
                                <span class="numCenter">1</span>
                                <span class="numRight">+</span>
                            </td>
                            <td class="Sum">
                                <span style="font-size: 17px;">￥</span>
                                 <span class="goodsSum">20.00</span></td>
                            <td class="handle ">
                                <button class="delGoods">删除</button>
                            </td>
                        </tr>
                        <tr class="row">
                            <td class="Name">
                                <span class="chooses"></span>
                                <a href="" class="Name_goods">
                                    <img src="../img/cart01.jpg" alt="">
                                    <span class="goodsName">商品名称</span>
                                    <span class="goodsDescribe">商品款式</span>
                                    <span></span>
                                </a>
                                
                            </td>
                            <td class="Price">
                                <span class="goodsPrice">￥20.00</span>
                            </td>
                            <td class="Num">
                                <span class="numLeft">-</span>
                                <span class="numCenter">1</span>
                                <span class="numRight">+</span>
                            </td>
                            <td class="Sum">
                                <span style="font-size: 17px;">￥</span>
                                 <span class="goodsSum">20.00</span></td>
                            <td class="handle ">
                                <button class="delGoods">删除</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </div>
    <!-- ===================================================== ending -->
    <div id="ending">
        <div class="container">
            <div class="ending_nav">
                <div class="ending_contens">专业保障 品质无忧</div>
                <div class="ending_contens">7天退货 15天换货</div>
                <div class="ending_contens">全国包邮 安心购买</div>
                <div class="ending_contens">正品行货 精致服务</div>
            </div>
        </div>
    </div>
    <div class="navRight">
        <div class="service">
            <a href="">客服</a>
        </div>
        <div class="personCenter">
            <a href="personFront.html">个人中心</a>
        </div>
        <div class="shopCar">
            <a href="./shopCar.html">购物车</a>
        </div>
        <div class="returnTop">
            返回顶部
        </div>
    </div>
    <div class="footer select">让每一个用户都能得到最好的服务</div>
    <script src="../js/shopCar.js"></script>
</body>
</html>
