<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录进入后台</title>
    <link rel="shortcut icon" type="image/x-icon" href="https://www.huishoubao.com/Login">
    <link rel="stylesheet" href="../css/login2.css" type="text/css" />
    <script src="/jquery-3.4.1.min.js"></script>
</head>
<body>
    <div id="all">
        <div id="login">
            <div id="up">
              <h1>回收宝后台管理系统</h1>
            </div>
            <div id="login-down">
                <div id="down">
                    <div id="down-up" style="overflow:hidden；">
                        <img src="../img/人.png" style="width: 40px;height: 40px;">
                        <input id="username" type="text" placeholder="请输入用户名" autocomplete="off" >
                        <img src="../img/密码 (1).png" style="width: 40px;height: 40px;">
                        <input id="code" type="password" placeholder="请输入密码" autocomplete="off">
                        <!-- <button id="btn-code" style="width: 120px; height: 45px; ">
                            获取验证码
                        </button> -->
                        <div class="loginforget-pwd" >
                            <span style="color: #7f7f7f;">
                                忘记密码？
                            </span>
                        </div>

                        <button id="btn-login" onclick="enterfpage()"
                            style=" color: white; border: none; background-color: #4386f5; width: 85%; height: 50px;">登录</button>
                    </div>
                </div>
            </div>
            <div id="newpwd" style="overflow:hidden；">
                <p id="text"><b>重置密码</b></p>
                <div id="newpwd-input" style="cursor: pointer;">
                    <img src="../img/邮箱(1).png" style="width: 32px;height: 32px;">
                    <input id="pwdemail" type="text" placeholder="请输入邮箱">
                    <img src="../img/密码 (1).png" style="width: 32px;height: 32px;">
                    <input class="newpasswd" type="password" placeholder="输入新密码">
                    <img src="../img/验证码.png" style="width: 32px;height: 32px;">
                    <input class="pwdcode" type="text" placeholder="请输入验证码">
                    <button class="to-newpwd" style="border: none; color: white;">重置密码</button>
                     <span class="pwd-login" style="color: #4386f5;" onclick="ptologin()">去登录</span></p>
                    <p class="get-code" style="color: #4386f5; ">获取验证码</p>
                </div>
                <div id="email-error" style="border-radius: 10px;width: 120px;height: 32px; background-color: #d16d62;">
                    <span id="words"></span>
                </div>
                <img id="eye" onclick="stobigeye()" src="../img/small eye.png" style="width: 20px; height: 20px;">
            </div>
        </div>
    
    
    
    
    
    
    </div>
    
    
    
    </div>
</body>
<script src="../js/login2.js"></script>
</html>
