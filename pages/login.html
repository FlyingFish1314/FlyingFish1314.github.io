<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>登录进入前台页面</title>
    <!-- <title>回收宝-二手手机数码回收平台|手机回收,平板电脑回收,笔记本回收,数码产品回收 </title> -->
    <link rel="shortcut icon" type="image/x-icon" href="https://www.huishoubao.com/Login">
    <link rel="stylesheet" href="../css/login.css" type="text/css" />
</head>
<body>
    <!--style="cursor: not-allowed;"  鼠标禁用样式-->
   
        <div id="all">
            <div id="login">
                <div id="up">
                   <img src="../img/login-text.png">
                </div>
            <div id="login-down">   
                <div id="down">
                    <div id="down-up" style="overflow:hidden；">
                            <img src="../img/邮箱(1).png" style="width: 34px;height: 34px;">
                            <input id="username" type="text" placeholder="请输入邮箱" autocomplete="off" onfocus="one()" onblur="two()">
                            <img src="../img/验证码.png"  style="width: 28px;height: 28px;">
                            <input id="code" type="text" placeholder="请输入验证码"  autocomplete="off" onfocus="first()" onblur="second()">
                       
                            <button id="btn-code"  onclick="btncode()" style="width: 90px; height: 40px; ">
                                获取验证码
                            </button>
                            <div id="pwd">
                                <div id="forget-pwd" onclick="tonesss()" >
                                    <span>
                                        忘记密码？
                                    </span>
                                </div>
                                <div id="rememberpwd">
                                    <input type="checkbox">
                                   <p>记住密码</p>
                                </div>
                                <div id="autologin">
                                    <input type="checkbox">
                                  <p>自动登录</p>
                                </div>
                            </div>
                            <div class="to-register">
                                <span style="color: gainsboro;font-size: 14px; " onclick="ltoregister()"><b>注册账号</b></span>
                            </div>
                       
                           
                        <button onclick="en()" id="btn-login" style=" color: white; border: none; background-color: #4386f5; width: 70%; height: 40px;">登录</button>
                    </div>

                    <div id="email-error" style="border-radius: 10px;   width: 120px;height: 40px; background-color: #d16d62;">
                        <span id="words"></span>
                    </div>
                </div>

                              
                </div>
                <div id="register" style="overflow:hidden；">
                    <p id="text" style="font-size: 20px;"><b>注册账号</b></p>
                    <div id="register-up">
                        <img src="../img/人.png" style="width: 22px;height: 22px;">
                        <input id="nickname" type="text" placeholder="请输入昵称">
                        <img src="../img/邮箱(1).png" style="width: 28px;height: 28px;">
                        <input id="pwdemail" type="text" placeholder="请输入邮箱">
                        <img src="../img/密码 (1).png" style="width: 21px;height: 21px;">
                        <input id="registerpwd" type="password" placeholder="请输入密码">
                        <img src="../img/验证码.png" style="width: 21px;height: 21px;">
                        <input id="pwdcode" type="text" placeholder="请输入验证码">
                        <button id="get-register" style="color:#4386f5 ;">
                            获取验证码
                        </button>
                        <button class="btn-register" style="color: white;">立即注册</button>
                        <span class="back-login" style="color: #4386f5;" onclick="rtologin()">去登录</span>
                    </div>
                </div>
                
                
                <div id="newpwd">
                    <p id="text"><b>重置密码</b></p>
                    <div id="newpwd-input">
                        <img src="../img/邮箱(1).png" style="width: 28px;height: 28px;">
                        <input id="pwd" type="text" placeholder="请输入邮箱">
                        <img src="../img/密码 (1).png" style="width: 21px;height: 21px;">
                        <input class="newpasswd" type="password" placeholder="输入新密码">
                        <img src="../img/验证码.png" style="width: 21px;height: 21px;">
                        <input type="text" placeholder="请输入验证码">
                        <button class="to-newpwd" style="border: none; color: white;">重置密码</button>
                        <span class="pwd-register" style="color: #4386f5;" onclick="ptoregister()">去注册</span>
                        <p class="pwd-login"  >已有帐号，<span  style="color: #4386f5;" onclick="ptologin()">去登录</span></p>
                        <p class="get-code" style="color: #4386f5; cursor: pointer;">获取验证码</p>
                    </div>
                    <img id="eye" onclick="stobigeye()" src="./img/small eye.png" style="width: 20px; height: 20px;">
                </div>

            </div>




            

            </div>
            
            
           
        </div>
        
       
 
    
</body>
<script src="../js/login.js"></script>









</html>
